<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spreetail Shared Expenses</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ url_for('dashboard') }}">Shared Expenses</a>
    {% if session.user_id %}
      <nav>
        <a href="{{ url_for('dashboard') }}">Balances</a>
        <a href="{{ url_for('groups') }}">Groups</a>
        <a href="{{ url_for('new_expense') }}">Expense</a>
        <a href="{{ url_for('import_view') }}">Import</a>
        <a href="{{ url_for('logout') }}">Logout</a>
      </nav>
    {% endif %}
  </header>
  <main class="page">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
