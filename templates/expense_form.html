{% extends "base.html" %}
{% block content %}
<div class="heading"><h1>Create Expense</h1></div>
<form method="post" class="panel form-grid">
  <label>Group
    <select name="group_id">{% for g in groups %}<option value="{{ g.id }}">{{ g.name }}</option>{% endfor %}</select>
  </label>
  <label>Date <input type="date" name="expense_date" required></label>
  <label>Description <input name="description" required></label>
  <label>Category
    <select name="category">
      <option>Uncategorized</option>
      <option>Rent</option>
      <option>Utilities</option>
      <option>Groceries</option>
      <option>Food</option>
      <option>Cleaning</option>
      <option>Trip</option>
      <option>Furniture</option>
    </select>
  </label>
  <label>Paid By <input name="paid_by" required></label>
  <label>Amount INR <input name="amount" type="number" step="0.01" required></label>
  <label>Split Type
    <select name="split_type">
      <option>equal</option>
      <option>unequal</option>
      <option>percentage</option>
      <option>share</option>
    </select>
  </label>
  <label>Split With <input name="split_with" placeholder="Aisha;Rohan;Priya" required></label>
  <label>Split Details <input name="split_details" placeholder="Aisha 2; Rohan 1"></label>
  <label>Notes <input name="notes"></label>
  <button type="submit">Save Expense</button>
</form>
{% endblock %}
